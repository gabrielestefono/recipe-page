<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Omelette Recipe - Gabriel Estéfono</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Young+Serif&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* --- COLORS ---*/
        /* Rose */
        --rose-50: #fff7fb;
        --rose-800: #7a284e;

        /* Stone */
        --stone-100: #f3e5d7;
        --stone-150: #e3ddd7;
        --stone-600: #5f564d;
        --stone-900: #312e2c;

        /* Brown */
        --brown-800: #854632;

        /* White */
        --white: #ffffff;

        /* --- TYPOGRAPHY --- */
        /* Font-size */
        --size-40: 2.5rem;
        --size-28: 1.75rem;
        --size-20: 1.25rem;
        --size-16: 1rem;

        /* Font-weight */
        --weight-400: 400;
        --weight-600: 600;
        --weight-700: 700;

        /* Line-height */
        --height-100: 1;
        --height-150: 1.5;

        /* Font-family */
        --font-young-serif: "Young Serif", serif;
        --font-outfit: "Outfit", sans-serif;

        /* --- SPACING --- */
        --spacing-100: 0.5rem;
        --spacing-150: 0.75rem;
        --spacing-200: 1rem;
        --spacing-300: 1.5rem;
        --spacing-400: 2rem;
        --spacing-500: 2.5rem;
        --spacing-600: 3rem;
        --spacing-1600: 8rem;
      }

      * {
        margin: 0;
        padding: 0;
      }

      .text-preset-01 {
        font-family: var(--font-young-serif);
        font-size: var(--size-40);
        line-height: var(--height-100);
        font-weight: var(--weight-400);
      }

      .text-preset-02 {
        font-family: var(--font-young-serif);
        font-size: var(--size-28);
        line-height: var(--height-100);
        font-weight: var(--weight-400);
      }

      .text-preset-03 {
        font-family: var(--font-outfit);
        font-size: var(--size-20);
        line-height: var(--height-100);
        font-weight: var(--weight-600);
      }

      .text-preset-04 {
        font-family: var(--font-outfit);
        font-size: var(--size-16);
        line-height: var(--height-150);
        font-weight: var(--weight-400);
      }

      .text-preset-04-bold {
        font-family: var(--font-outfit);
        font-size: var(--size-16);
        line-height: var(--height-150);
        font-weight: var(--weight-700);
      }

      .sr-only {
        position: absolute;
        left: -1px;
        top: -1px;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
